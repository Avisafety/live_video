logLevel: info
logDestinations: [stdout]

# ---------------------------------------------------------------------------
# Authentication through Supabase Edge Function
#
# MediaMTX calls atlas-video-auth for every publish and read request.
# ---------------------------------------------------------------------------
authMethod: http
authHTTPAddress: https://wazxzyygflomhyoomxcc.functions.supabase.co/atlas-video-auth

authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

# ---------------------------------------------------------------------------
# Disable unused services
# ---------------------------------------------------------------------------
rtsp: false
hls: false
srt: false
moq: false
api: false
metrics: false
pprof: false
playback: false

# ---------------------------------------------------------------------------
# RTMP ingest
#
# Fly.io terminates RTMPS on external port 1936 and forwards plaintext
# RTMP to MediaMTX on internal port 1935.
# ---------------------------------------------------------------------------
rtmp: true
rtmpEncryption: "no"
rtmpAddress: :1935

# ---------------------------------------------------------------------------
# WebRTC / WHEP
#
# Fly.io terminates HTTPS on port 443 and forwards WHEP signaling
# to MediaMTX on internal port 8889.
# ---------------------------------------------------------------------------
webrtc: true
webrtcAddress: :8889
webrtcEncryption: false

webrtcAllowOrigins:
  - "https://app.avisafe.no"
  - "https://mil.avisafe.no"

# ---------------------------------------------------------------------------
# WebRTC ICE over TCP
# ---------------------------------------------------------------------------
webrtcLocalUDPAddress: ""
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: false

webrtcAdditionalHosts:
  - 213.188.192.253

webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 4s

# ---------------------------------------------------------------------------
# Dynamic paths — one stream per drone serial
# ---------------------------------------------------------------------------
paths:
  all_others:
