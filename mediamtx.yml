logLevel: info
logDestinations: [stdout]

# Authentication through Supabase Edge Function
authMethod: http
authHTTPAddress: https://wazxzyygflomhyoomxcc.functions.supabase.co/atlas-video-auth
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

# Disable unused services
rtsp: false
hls: false
srt: false
moq: false
api: false
metrics: false
pprof: false
playback: false

# RTMP ingest
rtmp: true
rtmpEncryption: "no"
rtmpAddress: :1935

# WebRTC / WHEP
webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins:
  - "https://app.avisafe.no"
  - "https://mil.avisafe.no"

# TCP-only ICE
webrtcLocalUDPAddress: ""
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: false
webrtcAdditionalHosts:
  - live-video.fly.dev

webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 4s

# Dynamic stream paths
paths:
  all_others:
