# Fly.io service definition for the Atlas live-video MediaMTX server.
#
# One machine only in v1 (min_machines_running = 1, auto_stop off) so the
# publisher (Atlas) and the viewer (Avisafe browser) always hit the same
# media server.
#
# Deploy manually from this directory:  fly deploy
app = "live-video"
primary_region = "ams"

[build]

# --- WHEP signaling (HTTP) : external :443/:80  ->  internal :8889 ----------
# Fly terminates TLS; MediaMTX serves plain HTTP WHEP on :8889.
[[services]]
  protocol = "tcp"
  internal_port = 8889
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [[services.ports]]
    port = 80
    handlers = ["http"]

# --- RTMPS ingest : external :1936 (TLS)  ->  internal :1935 (plaintext) ----
# Fly terminates TLS and forwards raw RTMP to MediaMTX.
[[services]]
  protocol = "tcp"
  internal_port = 1935
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 1936
    handlers = ["tls"]

# --- WebRTC ICE over TCP : external :8189  ->  internal :8189 (raw) ---------
# Raw TCP passthrough — ICE/DTLS handles its own encryption, no TLS handler.
[[services]]
  protocol = "tcp"
  internal_port = 8189
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8189

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
