# Fly.io service definition for the AviSafe live-video MediaMTX server.
#
# One machine only in v1 so the publisher and viewer always connect to
# the same MediaMTX instance.
#
# Deploy manually from this directory:
#   fly deploy

app = "live-video"
primary_region = "ams"

[build]

# ---------------------------------------------------------------------------
# WHEP signaling
#
# External:
#   https://live-video.fly.dev
#
# Internal:
#   MediaMTX WebRTC/WHEP HTTP server on port 8889
# ---------------------------------------------------------------------------
[[services]]
  protocol = "tcp"
  internal_port = 8889
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

# ---------------------------------------------------------------------------
# RTMPS ingest
#
# External:
#   rtmps://live-video.fly.dev:1936/<serial>?key=<API_KEY>
#
# Fly terminates TLS and forwards plaintext RTMP to MediaMTX on port 1935.
# ---------------------------------------------------------------------------
[[services]]
  protocol = "tcp"
  internal_port = 1935
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 1936
    handlers = ["tls"]

# ---------------------------------------------------------------------------
# WebRTC ICE over TCP
#
# Raw TCP passthrough. WebRTC/DTLS handles encryption itself.
# ---------------------------------------------------------------------------
[[services]]
  protocol = "tcp"
  internal_port = 8189
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8189

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
